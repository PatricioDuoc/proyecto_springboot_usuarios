name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Dar permisos Maven
        run: chmod +x mvnw

      # - name: Ejecutar tests
      #   run: ./mvnw test

      # - name: Generar reporte JaCoCo
      #   run: ./mvnw jacoco:report

      - name: Analisis SonarQube
        run: |
          ./mvnw sonar:sonar \
          -Dsonar.projectKey=proyecto_springboot_usuarios \
          -Dsonar.organization=patricioduoc \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.github-actions }}

      - name: Compilar proyecto
        run: ./mvnw clean package

      - name: Build Docker
        run: docker build -t springboot-devops .

      - name: Deploy Docker Compose
        run: docker compose up -d --build